#@TYPE: Machine
#@NAME: SiMa.ai Modalix common machine file
#@DESCRIPTION: Reference machine configuration for SiMa.ai Modalix based boards

include conf/machine/include/simaai-common.inc

MACHINE ?= "modalix"

# ZEBU flag (default off)
ZEBU ?= "0"
# Init Manager specific config
INIT_MANAGER = "${@'sysvinit' if d.getVar('ZEBU') == '1' else 'systemd'}"

#Linux Kernel device trees and configuration for SiMa.ai Modalix platform
DEVICETREE_NAME = "modalix-dvt.dtb;boot-0/ modalix-hhhl.dtb;boot-0/ \
                   modalix-som.dtb;boot-0/ modalix-som_8g.dtb;boot-0/ \
                   modalix-som_16g.dtb;boot-0/ \
                   modalix-hhhl_x16.dtb;boot-0/ modalix-hhhl_1r.dtb;boot-0/ \
                   modalix-hhhl_v2.dtb;boot-0/ \
                   modalix-dvt.dtb;boot-1/ modalix-hhhl.dtb;boot-1/ \
                   modalix-som.dtb;boot-1/ modalix-som_8g.dtb;boot-1/ \
                   modalix-som_16g.dtb;boot-1/ \
                   modalix-hhhl_x16.dtb;boot-1/ modalix-hhhl_1r.dtb;boot-1/ \
                   modalix-hhhl_v2.dtb;boot-1/"
KERNEL_DEVICETREE = "simaai/modalix-dvt.dtb simaai/modalix-hhhl.dtb simaai/modalix-som.dtb \
                    simaai/modalix-hhhl_x16.dtb simaai/modalix-hhhl_1r.dtb simaai/modalix-hhhl_v2.dtb \
                    simaai/modalix-zebu-basic.dtb simaai/modalix-zebu-pcie.dtb simaai/modalix-som_8g.dtb \
			simaai/modalix-som_16g.dtb"
KBUILD_DEFCONFIG ?= "simaai_modalix_defconfig"

BAUD = "${@115200 if d.getVar('BAUDRATE') == None else d.getVar('BAUDRATE')}"

#Linux console - change default baudrate
SERIAL_CONSOLES ?= "${BAUD};ttyS0"

#U-BOOT specific config
UBOOT_MACHINE = "sima_modalix_defconfig"

#WIC file ruiles
WKS_FILE ?= "simaai-modalix-image.wks"

# Enable SiMa.ai EULA license
LICENSE_FLAGS_ACCEPTED = "commercial"
SIMAAI_LICENSE_DIR = "${TOPDIR}/../meta-simaai/licenses"
LICENSE_PATH += "${SIMAAI_LICENSE_DIR}"

DISTRO_FEATURES:remove = "bluetooth wifi 3g nfc vulkan wayland"
MACHINE_FEATURES += "alsa usbgadget usbhost"
SDKIMAGE_FEATURES:remove ="dbg-pkgs src-pkgs"
